inherit_from: .rubocop_todo.yml

require:
  - ./lib/rubocop/cop/rouge/no_building_alternation_pattern_in_regexp.rb
  - ./lib/rubocop/cop/rouge/no_huge_collections.rb

plugins:
  - rubocop-performance
  - rubocop-minitest
  - rubocop-rake

AllCops:
  TargetRubyVersion: 3.0
  DisplayCopNames: true
  Exclude:
    - "tasks/**/*"
    - "vendor/**/*"
    - "lib/rouge/lexers/**/keywords.rb"
    - "lib/rouge/lexers/**/builtins.rb"
  NewCops: enable

Rouge:
  Enabled: true

Style:
  Enabled: false

Layout:
  Enabled: false

Layout/TrailingWhitespace:
  Enabled: true
  AllowInHeredoc: true

Layout/IndentationStyle:
  Enabled: true
  IndentationWidth: 2
  EnforcedStyle: spaces

Layout/IndentationWidth:
  Enabled: true

Layout/EndAlignment:
  Enabled: true
  EnforcedStyleAlignWith: variable

Layout/EndOfLine:
  Enabled: true

Layout/TrailingEmptyLines:
  Enabled: true

Metrics:
  Enabled: false

Bundler:
  Enabled: false

Lint/UselessAssignment:
  Enabled: false

Lint/AssignmentInCondition:
  AllowSafeAssignment: true

Lint/UnusedMethodArgument:
  Enabled: false

Lint/UnusedBlockArgument:
  Enabled: false

Lint/EmptyWhen:
  Enabled: false

Lint/RedundantSplatExpansion:
  Enabled: false

Lint/IneffectiveAccessModifier:
  Enabled: false

Lint/AmbiguousOperatorPrecedence:
  Enabled: false

# this just is plain broken, disabling
Lint/OutOfRangeRegexpRef:
  Enabled: false

# there are actual reasons to do this
Lint/MissingSuper:
  Enabled: false

# sometimes the arguments are deprecated you guys
Lint/ToEnumArguments:
  Enabled: false

# sometimes we deal with very gnarly strings, this is not useful
Lint/NestedPercentLiteral:
  Enabled: false

# usually not actionable
Lint/DuplicateBranch:
  Enabled: false

Lint/NonLocalExitFromIterator:
  Enabled: false

Naming/BlockForwarding:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

Naming/HeredocDelimiterNaming:
  Enabled: false

Naming/VariableNumber:
  Enabled: false

Performance/RegexpMatch:
  Enabled: false

Performance/ConstantRegexp:
  Enabled: false

Performance/UnfreezeString:
  Enabled: false
